# Render Blueprint — JSON Server for StudySmart (db.json)
#
# Deploy: Render Dashboard → New → Blueprint → Connect this repo → apply.
# Service root (/) lists links to /users, /groups, /notes, /meetings, etc. All data is db.json from Git.
# After the service is live, use its URL (https://<service-name>.onrender.com) as:
#   - VITE_API_URL  (Vercel, no trailing slash)
#   - JSON_SERVER_URL (Vercel, same value)
#
# Private org repos: grant the Render GitHub app access to the org/repo first.

services:
  - type: web
    name: studysmart-json
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && node scripts/verify-db-for-render.mjs
    startCommand: npx json-server --watch db.json --port $PORT --host 0.0.0.0 --cors --static ./render-public
    healthCheckPath: /users
